债券基金知识
📘一、债券基金
债券基金是指**专门投资于债券的基金**，通过集中众多投资者的资金，对债券进行组合投资，属于中低风险理财品类，收益和风险介于货币基金与股票基金之间，适合追求稳健收益、风险承受能力偏低的投资者。
核心投资标的
国债：国家发行的债券，信用等级最高，风险极低
金融债：银行及非银行金融机构发行，风险较低
企业债/公司债：企业发行，收益偏高，可转债：可转换为股票的债券，兼具债性与股
短期融资券、中期票据等固定收益类资产
债券基金核心特点
风险适中：整体波动远小于股票基金，
收益稳定：以固定利息收入为主，流动性强：多数开放式债券基金可
门槛较低：1元起购，适合普通投资者闲钱配置
